name: Release to Play Store

# Two triggers:
#   1. Push a tag like `v1.2.4+9` -> build + upload to the internal track.
#   2. Manual run via the Actions UI -> pick a track (internal/alpha/beta/production).
#
# Required GitHub repo secrets (Settings -> Secrets and variables -> Actions):
#   ANDROID_KEYSTORE_BASE64   base64-encoded contents of workout_log-keystore.jks
#                             generate with: base64 -w 0 workout_log-keystore.jks
#   ANDROID_KEYSTORE_PASSWORD store password
#   ANDROID_KEY_PASSWORD      key password
#   ANDROID_KEY_ALIAS         key alias (currently `key`)
#   PLAY_SERVICE_ACCOUNT_JSON contents of the Google Play API service account JSON.
#                             Create via:
#                               1. Google Cloud Console -> IAM & Admin -> Service Accounts
#                                  -> create one, grant role "Service Account User", and
#                                  download a JSON key.
#                               2. Google Play Console -> Users and permissions -> invite
#                                  the service-account email, grant "Release manager" or
#                                  "Admin" with at least the "Release apps" permission.
#                               3. Paste the entire JSON into this secret.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        required: true
        default: 'internal'
        type: choice
        options: [internal, alpha, beta, production]

permissions:
  contents: read

jobs:
  release:
    name: Build and upload AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Static analysis (fail fast)
        run: flutter analyze

      - name: Tests (fail fast)
        run: flutter test

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > android/workout_log-keystore.jks

      - name: Write key.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=workout_log-keystore.jks
          EOF

      - name: Build app bundle
        run: flutter build appbundle --release

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.lukk.workoutlog
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track || 'internal' }}
          status: completed
          changesNotSentForReview: false
          # If you maintain release notes under fastlane/metadata/android/<lang>/changelogs/,
          # the action picks them up automatically. Otherwise create that tree on demand.

      - name: Upload AAB as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
