name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# `dart format --set-exit-if-changed` is deliberately NOT run here: the
# project uses a hand-curated style (empty lines around try/catch,
# braced inline if-returns) that the standard Dart formatter would
# revert. flutter analyze still enforces every lint we care about.

jobs:
  test:
    name: analyze + test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 14
